name: Feature request
description: Suggest an improvement or new TrainDeck capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like TrainDeck to do?
      description: Describe the workflow, control, simulator, or tablet behavior you want.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this help?
      description: Explain the driving scenario or usability problem this would improve.
    validations:
      required: true
  - type: input
    id: route-loco
    attributes:
      label: Route, locomotive, or simulator
      placeholder: TSW 6, Class 395, Train Simulator Classic, etc.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes, screenshots, or references
      description: Add extra context. Please do not submit source code or patches unless Maple Vibe Inc. has requested them.
    validations:
      required: false
